# ConnectVeiculos - reverse proxy
# Roteia: /api/* e /hubs/* -> backend .NET
#         /uploads/*       -> backend .NET
#         tudo mais        -> frontend SSR (Node Express com Angular SSR)
#
# HTTPS: rode scripts/setup-https.sh apos o primeiro deploy para gerar
# certificados Let's Encrypt em /etc/letsencrypt. Depois descomente o
# bloco "listen 443 ssl" abaixo e mude o redirect HTTP->HTTPS.

# Esconde a versao do nginx em respostas (Server: nginx em vez de nginx/1.x.x).
server_tokens off;

# HTTP - serve ACME challenge + redireciona para HTTPS quando configurado
server {
    listen 80;
    server_name connectveiculos.dev.br www.connectveiculos.dev.br;

    # Let's Encrypt ACME challenge (precisa estar acessivel via HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Apos gerar o cert SSL, descomente a linha abaixo para forcar HTTPS:
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    # Security headers (ver bloco HTTPS para HSTS - so faz sentido sob TLS)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;

    # Compressao
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # API REST -> backend
    location /api/ {
        proxy_pass http://backend-cliente:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    # SignalR Hubs (WebSocket) -> backend
    location /hubs/ {
        proxy_pass http://backend-cliente:8080/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Uploads (imagens dos veiculos) -> backend
    # add_header dentro de location nao herda do server, precisa repetir.
    location /uploads/ {
        proxy_pass http://backend-cliente:8080/uploads/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Tudo mais (HTML, JS, CSS, imagens, sitemap, robots.txt) -> Node SSR
    location / {
        proxy_pass http://frontend-ssr:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 30s;
    }
}

