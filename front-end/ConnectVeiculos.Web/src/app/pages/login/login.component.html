<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Connect Veículos</h1>
      <p>Sistema de Gestão de Veículos</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      @if (errorMessage) {
        <div class="error-message">
          {{ errorMessage }}
        </div>
      }

      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Digite seu e-mail"
          [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <span class="field-error">E-mail inválido</span>
        }
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          formControlName="senha"
          placeholder="Digite sua senha"
          [class.invalid]="loginForm.get('senha')?.invalid && loginForm.get('senha')?.touched"
        />
        @if (loginForm.get('senha')?.invalid && loginForm.get('senha')?.touched) {
          <span class="field-error">Senha deve ter no mínimo 4 caracteres</span>
        }
      </div>

      <button type="submit" [disabled]="loginForm.invalid || loading" class="btn-login">
        @if (loading) {
          <span>Entrando...</span>
        } @else {
          <span>Entrar</span>
        }
      </button>

      <!-- <div class="login-footer">
        <a routerLink="/recuperar-senha">Esqueci minha senha</a>
      </div> -->
    </form>
  </div>
</div>
