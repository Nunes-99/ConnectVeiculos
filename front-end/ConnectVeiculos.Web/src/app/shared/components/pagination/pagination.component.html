<div class="pagination-container" *ngIf="totalItems > 0">
  <div class="pagination-info">
    <span>Mostrando {{ startItem }} - {{ endItem }} de {{ totalItems }}</span>
  </div>

  <div class="pagination-controls">
    <button class="btn-page" (click)="goToPage(1)" [disabled]="page === 1" title="Primeira">
      <span class="material-icons">first_page</span>
    </button>
    <button class="btn-page" (click)="previousPage()" [disabled]="page === 1" title="Anterior">
      <span class="material-icons">chevron_left</span>
    </button>

    @for (p of pages; track p) {
      <button class="btn-page" [class.active]="p === page" (click)="goToPage(p)">
        {{ p }}
      </button>
    }

    <button class="btn-page" (click)="nextPage()" [disabled]="page === calculatedTotalPages" title="Próxima">
      <span class="material-icons">chevron_right</span>
    </button>
    <button class="btn-page" (click)="goToPage(calculatedTotalPages)" [disabled]="page === calculatedTotalPages" title="Última">
      <span class="material-icons">last_page</span>
    </button>
  </div>

  <div class="pagination-size">
    <label>
      <span>Itens por página:</span>
      <select [value]="pageSize" (change)="onPageSizeChange($event)">
        @for (size of pageSizeOptions; track size) {
          <option [value]="size">{{ size }}</option>
        }
      </select>
    </label>
  </div>
</div>
