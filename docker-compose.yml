version: '3.8'

# Stack producao do ConnectVeiculos:
#   nginx           -> reverse proxy + HTTPS (porta 80/443)
#   frontend-ssr    -> Node Express servindo Angular SSR (porta interna 4000)
#   backend-cliente -> .NET 8 API (porta interna 8080)
#
# Para subir: docker compose up -d --build
# Para HTTPS: instalar certbot no host e gerar certificado contra ./nginx/certs (ver scripts/setup-https.sh)

services:
  # ============================
  # BACKEND - .NET 8 API
  # ============================
  backend-cliente:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/cliente.db
      - JwtSettings__SecretKey=${JWT_SECRET_KEY_CLIENTE:-ChaveSecretaCliente2024MuitoSegura!@#$%}
      - JwtSettings__Issuer=ConnectVeiculos
      - JwtSettings__Audience=ConnectVeiculosApp
      - JwtSettings__ExpirationInHours=8
      # CORS multi-tenant: ALLOWED_ROOT_DOMAINS aceita qualquer subdomain do dominio
      # listado (acme.connectveiculos.dev.br, etc). ALLOWED_ORIGINS continua
      # suportado como complemento (URLs explicitas adicionais).
      - ALLOWED_ROOT_DOMAINS=${ALLOWED_ROOT_DOMAINS:-connectveiculos.dev.br,connectveiculos.com.br}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - ML_APP_ID=${ML_APP_ID:-}
      - ML_CLIENT_SECRET=${ML_CLIENT_SECRET:-}
      - ML_REDIRECT_URI=${ML_REDIRECT_URI:-https://connectveiculos.dev.br/api/integracoes/mercadolivre/callback}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID:-}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:contato@connectveiculos.dev.br}
      # OCR de CRLV via Google Gemini (tier gratuito 1500 req/dia).
      # Tambem pode ser configurado por tenant via UI em /integracoes.
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Multi-tenant
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-}
      - TENANTS_DATA_DIR=${TENANTS_DATA_DIR:-/app/data}
      - DEFAULT_TENANT_DATABASE_FILE=${DEFAULT_TENANT_DATABASE_FILE:-cliente.db}
      # Fallback de URL publica usada para montar links de produtos enviados ao
      # Google Merchant / Facebook quando Loja.LojUrlCatalogo estiver vazio.
      - GoogleMerchantSettings__PublicSiteUrl=${PUBLIC_SITE_URL:-https://connectveiculos.dev.br}
      - FacebookCatalogSettings__PublicSiteUrl=${PUBLIC_SITE_URL:-https://connectveiculos.dev.br}
    volumes:
      - ./data:/app/data
      - ./uploads/cliente:/app/wwwroot/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # ============================
  # FRONTEND - Angular SSR (Node Express)
  # ============================
  frontend-ssr:
    build:
      context: ./front-end/ConnectVeiculos.Web
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=4000
      - API_BASE_URL=http://backend-cliente:8080
      # SITE_BASE_URL deliberadamente NAO setado aqui — server.ts faz fallback
      # para `${req.protocol}://${req.get('host')}` (Host header), que naturalmente
      # reflete o subdomain do tenant atual no SSR. Setar valor fixo aqui geraria
      # URLs canonicas erradas (sitemap, OG tags) para tenants nao-default.
      # Override explicito via env var SITE_BASE_URL ainda eh respeitado se definido.
      - SITE_BASE_URL=${SITE_BASE_URL:-}
    depends_on:
      - backend-cliente
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================
  # NGINX - reverse proxy + HTTPS
  # ============================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certificados Let's Encrypt (gerados pelo certbot no host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend-ssr
      - backend-cliente
    restart: unless-stopped

networks:
  default:
    name: connectveiculos-network
