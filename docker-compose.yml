version: '3.8'

services:
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    ports:
      - "5219:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/ConnectVeiculos.db
      - JwtSettings__SecretKey=${JWT_SECRET_KEY:-ChaveSecretaConnectVeiculos2024MuitoSeguraProducao!@#$%}
      - JwtSettings__Issuer=ConnectVeiculos
      - JwtSettings__Audience=ConnectVeiculosApp
      - JwtSettings__ExpirationInHours=8
    volumes:
      - ./data:/app/data
      - ./uploads:/app/wwwroot/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./front-end/ConnectVeiculos.Web
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: connectveiculos-network
